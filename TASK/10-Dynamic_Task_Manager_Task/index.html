<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lumina Task Board</title>

  <!--sheet link for style-->
  <link rel="stylesheet" href="style.css">

  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet">
</head>

<body>

  <div class="layout">

    <!-- Sidebar -->

    <aside class="sidebar">

      <div class="sidebar-top">
        <h2 class="logo">Lumina</h2>
      </div>

      <ul class="menu">
        <li class="active">📋 Boards</li>
        <li>📅 Timeline</li>
        <li>👨‍💻 Team</li>
        <li>⚙ Settings</li>
      </ul>

    </aside>

    <!-- Main -->

    <div class="main">

      <!-- Mobile Menu Button -->

      <button class="menu-btn" onclick="toggleMenu()">☰</button>

      <!-- Header -->

      <header class="header">

        <div class="header-left">
          <h1>Task Dashboard</h1>
          <p>Manage your projects and tasks easily 🚀</p>
        </div>

        <div class="header-actions">

          <input
            type="text"
            id="search"
            placeholder="Search tasks...">

          <select id="filter">
            <option value="">All Priority</option>
            <option value="High">High</option>
            <option value="Medium">Medium</option>
            <option value="Low">Low</option>
          </select>

          <button
            class="add-btn"
            onclick="openModal()">
            + Add Task
          </button>

        </div>

      </header>

      <!-- Stats -->

      <section class="stats">

        <div class="stat-card">
          <h3>Total Tasks</h3>
          <p id="totalTasks">0</p>
        </div>

        <div class="stat-card">
          <h3>In Progress</h3>
          <p id="progressTasks">0</p>
        </div>

        <div class="stat-card">
          <h3>Completed</h3>
          <p id="doneTasks">0</p>
        </div>

      </section>

      <!-- Board -->

      <section class="board">

        <!-- Todo -->

        <div
          class="column"
          id="todo">

          <div class="column-header">
            <h2>To Do</h2>
            <span class="task-count">0</span>
          </div>

        </div>

        <!-- Progress -->

        <div
          class="column"
          id="progress">

          <div class="column-header">
            <h2>In Progress</h2>
            <span class="task-count">0</span>
          </div>

        </div>

        <!-- Done -->

        <div
          class="column"
          id="done">

          <div class="column-header">
            <h2>Completed</h2>
            <span class="task-count">0</span>
          </div>

        </div>

      </section>

    </div>

  </div>

  <!-- Modal -->

  <div
    class="modal"
    id="modal">

    <div class="modal-box">

      <h2>Create Task</h2>

      <input
        type="text"
        id="title"
        placeholder="Task Title">

      <textarea
        id="desc"
        placeholder="Task Description"></textarea>

      <select id="priority">
        <option>High</option>
        <option>Medium</option>
        <option>Low</option>
      </select>

      <select id="status">
        <option value="todo">To Do</option>
        <option value="progress">In Progress</option>
        <option value="done">Completed</option>
      </select>

      <div class="modal-actions">

        <button
          class="save-btn"
          onclick="saveTask()">
          Save Task
        </button>

        <button
          class="cancel-btn"
          onclick="closeModal()">
          Cancel
        </button>

      </div>

    </div>

  </div>

  <script src="script.js"></script>

</body>

</html>
