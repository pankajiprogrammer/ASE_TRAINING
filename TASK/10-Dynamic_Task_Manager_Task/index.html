<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lumina Task Board</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="layout">

  <!-- Sidebar -->
  <aside class="sidebar">
    <h2 class="logo">Lumina</h2>
    <ul>
      <li class="active">Boards</li>
      <li>Timeline</li>
      <li>Team</li>
    </ul>
  </aside>

  <!-- Main -->
  <div class="main">

    <!-- Header -->
    <header class="header">
      <div>
        <h2>Dashboard</h2>
        <p class="subtitle">Manage your tasks 🚀</p>
      </div>

      <div class="header-actions">
        <input type="text" id="search" placeholder="Search tasks...">
        <select id="filter">
          <option value="">All</option>
          <option value="High">High</option>
          <option value="Medium">Medium</option>
          <option value="Low">Low</option>
        </select>
        <button class="add-btn" onclick="openModal()">+ Add Task</button>
      </div>
    </header>

    <!-- Stats -->
    <div class="stats">
      <div class="stat-card">
        <h4>Total Tasks</h4>
        <p id="totalTasks">0</p>
      </div>
      <div class="stat-card">
        <h4>In Progress</h4>
        <p id="progressTasks">0</p>
      </div>
      <div class="stat-card">
        <h4>Completed</h4>
        <p id="doneTasks">0</p>
      </div>
    </div>

    <!-- Board -->
    <div class="board">
      <div class="column" id="todo"></div>
      <div class="column" id="progress"></div>
      <div class="column" id="done"></div>
    </div>

  </div>
</div>

<!-- Modal -->
<div class="modal" id="modal">
  <div class="modal-box">
    <h3>Task</h3>

    <input id="title" placeholder="Title">
    <textarea id="desc" placeholder="Description"></textarea>

    <select id="priority">
      <option>High</option>
      <option>Medium</option>
      <option>Low</option>
    </select>

    <select id="status">
      <option value="todo">To Do</option>
      <option value="progress">In Progress</option>
      <option value="done">Completed</option>
    </select>

    <div class="modal-actions">
      <button onclick="saveTask()" class="add-btn">Save</button>
      <button onclick="closeModal()">Cancel</button>
    </div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
