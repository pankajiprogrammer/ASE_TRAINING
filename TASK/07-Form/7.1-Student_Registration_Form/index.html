<!--This page help me learn about form basic concept-->

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration Form</title>

<!--Here i attached the css file for this page -->
    <link
      rel="stylesheet"
      href="../7.1-Student_Registration_Form/style.css">
  </head>
  <body>

<!--From here the main section start -->
    <div class="main-box">
      <div class="form-section">
        <br>
        <br>

        <h1 class="heading">Student Registration Form</h1>
        <br>
        <br>

<!--Here i am created full form with the help of table -->

        <table>

          <thead>
            <tr> 
            <th colspan="2" class="heading">Registration Form</th>
            </tr>
          </thead>

          <tr>
            <td><p>Student Name</p></td>
            <td><input class="input" type="text"></td>
          </tr>

          <tr>
            <td><p>Father`s Name</p></td>
            <td><input class="input" type="text"></td>
          </tr>

          <tr>
            <td><p>Mother`s Name</p></td>
            <td><input class="input" type="text"></td>
          </tr>

          <tr>
            <td><p>Date of Birth</p></td>
            <td><input class="input" type="date"></td>
          </tr>

          <tr>
            <td><p>Gender</p></td>
            <td>
              <input type="radio" id="male">
              Male
              <input type="radio" id="Female">
              Female
            </td>
          </tr>

          <tr>
            <td><p>Email Id</p></td>
            <td><input class="input" type="email"></td>
          </tr>

          <tr>
            <td><p>Mobile Number</p></td>
            <td><input class="input" type="number"></td>
          </tr>

          <tr>
            <td><p>Address</p></td>
            <td><input class="input-address" type="text"></td>
          </tr>

          <tr>
            <td><p>State</p></td>
            <td><input class="input" type="text"></td>
          </tr>

          <tr>
            <td><p>City</p></td>
            <td><input class="input" type="text"></td>
          </tr>

          <tr>
            <td colspan="2" class="heading"><button>Submit</button></td>
          </tr>
        </table>


      </div>
    </div>
  </body>
</html>
