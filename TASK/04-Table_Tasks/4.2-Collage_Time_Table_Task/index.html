<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>college Time Table</title>
    <link rel="stylesheet" href="../4.2-Collage_Time_Table_Task/style.css">
</head>
<body>

    <div class="main-div">

        <h1 class="heading">Time Table</h1>

        <br>
        <br>

        <div class="table-div">

            <table class="table">

                <thead>
                    <tr>
                        <th colspan="6">Time Table</th>
                    </tr>

                </thead>

                <tbody>


                     <tr>
                        <th rowspan="6">Hours</th>
                        <th>Mon</th>
                        <th>Tue</th>
                        <th>Wed</th>
                        <th>Thu</th>
                        <th>Fri</th>
                    </tr>

                    <tr>
                        <td>Science</td>
                        <td>Maths</td>
                        <td>Science</td>
                        <td>Maths</td>
                        <td>Arts</td>
                    </tr>


                    <tr>
                        <td>Science</td>
                        <td>Maths</td>
                        <td>Science</td>
                        <td>Maths</td>
                        <td>Arts</td>
                    </tr>


                    <tr>
                        <th colspan="5">Lunch</th>
                    </tr>

                    <tr>
                        <td>Science</td>
                        <td>Maths</td>
                        <td>Science</td>
                        <td>Maths</td>
                        <td rowspan="2">Project</td>
                    </tr>

                    <tr>
                        <td>Science</td>
                        <td>Maths</td>
                        <td>Science</td>
                        <td>Maths</td>
                        
                    </tr>

                </tbody>

               
                    
               


            </table>


        </div>


    </div>
    
</body>
</html>
