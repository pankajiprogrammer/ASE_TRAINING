<!--This page for the quize web app-->

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quize Web App</title>

  <!--here link css for this page -->
  <link rel="stylesheet" href="style.css">
</head>

<body>
  
  <!-- Header section -->
  <header class="header">

    <!--Logo for page-->
    <div class="logo">Quiz Master</div>



    <!--This is navbar link-->
    <nav class="navbar">

      <a href="#">Home</a>
      <a href="#">Quiz</a>
      <a href="#">Results</a>

    </nav>

  </header>

  <!--here main section -->

  <main class="main-box">


    <!--this is question box-->
    <div class="quiz-box">

        <div class="quiz-head">

        <div class="q-count">Question <span id="curr-question">1</span> /
          <span id="total-q">5</span>
        </div>

        <div class="timer">Time Left: <span id="time">30</span>s</div>

      </div>

      <!--this is barr of progress-->
      
      <div class="progress-bar">
        <div class="progress" id="progress"></div>
      </div>


      <!--this is options -->
      <div id="quiz-box">

        <h2 id="question-text">Question Text</h2>

        <div class="options" id="options-c"></div>

        <button id="next-btn">Next Question </button>

      </div>


     
    <!--this is result box-->


    <div class="result-box hidden" id="result-box">

        <h2>Quiz Completed</h2>

        <!--show our score -->
        <p class="score">Your Score:<span id="score"></span></p>

        <!--shpw correct score-->
        <p> Correct Answers: <span id="correct-count"></span> </p>

        <!--show wrong answers-->
        <p> Wrong Answers: <span id="wrong-count"></span> </p>

        <h3 id="performance-message"></h3>

        <button id="resat-btn"> Restart Quiz </button>

      </div>

    </div>

  </main>


  <!--footer section -->

  <footer class="footer">

    <p>
      Powred by pankaj saratkar 2026
    </p>

  </footer>

  <script src="../quize_web_app/script.js"></script>
</body>
</html>
