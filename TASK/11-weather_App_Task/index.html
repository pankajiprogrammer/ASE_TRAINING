<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SkyMetrics Web Page</title>

 <!--this link for the font inter used in webpage -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

  <!--this link for the symbols used in webpage-->
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">

  <!--here i connect the css file-->
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!--thi is the side bar of the web page -->

<aside id="sidebar" class="sidebar">
  <h2>SkyMetrics</h2>
  <a href="#">🏠 Home</a>
  <a href="#">📅 Forecast</a>
  <a href="#">📍 Cities</a>
  <a href="#">⚙ Settings</a>
</aside>


<!--overlay effect on sidebar-->
<div id="overlay-bg" class="overlay-bg"></div>


<!-- this is the header section container three part-->
<header class="header">

  <span id="menuBtn" class="material-symbols-outlined icon">menu</span>

  <h1>SkyMetrics</h1>

  <span class="material-symbols-outlined icon">search</span>

</header>


<!--this is the search box -->
<div class="search-box">

  <input id="searchInput" type="text" placeholder="Search city...">

  <button id="searchBtn">Search</button>

</div>

<!--from here the main container start they also have part or section -->
<main class="container">

    <!--top section with city name date image location -->
  <div class="top-section">


    <!--this is the left section conatin image date temprature-->
    <div class="left">

      <div class="city-section">
        <h2 id="city">Pune</h2>
        <p id="date">--</p>
      </div>

      <div class="card main-card">
        <img id="weatherIcon" class="weather-icon" />

        <div class="temp">
          <span id="temp" class="value">--</span>
          <span class="unit">°C</span>
        </div>

        <p id="desc" class="desc">--</p>

        <div class="image-box">

          <img id="img_1" src="https://images.unsplash.com/photo-1569429512518-44dad00e88db?q=80&w=1470&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D">

          <div class="overlay">
            <span class="material-symbols-outlined small icon_1 ">location_on</span>
            <span id="country" class="c">--</span>
          </div>
          
        </div>
      </div>

    </div>

    <!-- this is the details section -->
    <div class="right">

      <div class="grid">

        <div class="card small">
          <p>Humidity</p>
          <br>
          <h3 id="humidityValue">--</h3>
          <div class="bar"><div id="humidityBar"></div></div>
        </div>

        <div class="card small">
          <p>Wind</p>
          <br>
          <h3 id="windValue">--</h3>
        </div>

        <div class="card small">
          <p>Visibility</p>
          <br>
          <h3 id="visibilityValue">--</h3>
        </div>

        <div class="card small">
          <p>Pressure</p>
          <br>
          <h3 id="pressureValue">--</h3>
        </div>

      </div>

    <!-- extra information -->
      <div class="extra-grid">

        <div class="card small">
          <p>Feels Like</p>
          <br>
          <h3 id="feelsLike">--</h3>
        </div>

        <div class="card small">
          <p>Min Temp</p>
          <br>
          <h3 id="tempMin">--</h3>
        </div>

        <div class="card small">
          <p>Max Temp</p>
          <br>
          <h3 id="tempMax">--</h3>
        </div>

        <div class="card small">
          <p>Clouds</p>
          <br>
          <h3 id="clouds">--</h3>
        </div>

      </div>

    </div>

  </div>

<br>

<!--thi is the bottom section contain sun set and sunrise information and insight-->
<div class="bottom-section">

    <!--this card for show sunrise and sunset time -->
   <div class="card sun-card">

  <div class="sun-row">
    <span class="material-symbols-outlined icon_1">sunny</span>
    <p>Sunrise</p>
    <span id="sunrise" class="time">--</span>
  </div>

  <div class="sun-row">
    <span class="material-symbols-outlined icon_1">partly_cloudy_day</span>
    <p>Sunset</p>
    <span id="sunset" class="time">--</span>
  </div>

</div>

    <!--this card for show insignht-->
    <div class="card insight">
        <p>Insignt:</p>
        <br>
       
      <p id="insightText">--</p>
    </div>

  </div>

</main>

<!--here i attached an script and logic for this page-->
<script src="script.js"></script>
</body>
</html>
