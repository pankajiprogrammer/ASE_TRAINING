<!--This page help to learn about box-sizing layout -->

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learn about Box-layout</title>
    <link rel="stylesheet" href="../../Learning_Resource/01 - Box-Layout/style.css">
  </head>
  <body>
    <div class="main-box">
      <div class="box-1 box">
        <br>
        <h3>Box-1</h3>
        <br>
        <p>box-sizing : content-box</p>
        <br>
        <p>
          Total width = 500px + 50px + 50px + 5px + 5px + 50px + 50px = 710px
        </p>
        <br>
        <p>
          Total hight = 400px + 50px + 50px + 5px + 5px + 50px + 50px = 610px
        </p>
      </div>

      <div class="box-2 box">
        <br>
        <h3>Box-2</h3>
        <br>
        <p>box-sizing : border-box</p>
        <br>
        <p>Total width = 500px + 5px + 5px = 510px</p>
        <br>
        <p>Total hight = 400px + 5px + 5px = 410px</p>
      </div>
    </div>
  </body>
</html>
