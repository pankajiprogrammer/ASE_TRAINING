<!--THis html page help to learn about display property-->

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learn About display property</title>
    <link rel="stylesheet" href="../../Learning_Resource/03 - Display Property/style.css">
  </head>
  <body>

    <div class="main-div">


    <br>

    <br>
      <h1 class="heading">Display inline </h1>

    <br>
    <br>
    <br>
    <br>


    <div class="box-inline">

        <div class="box display-inline">box-1</div>

        <div class="box display-inline">box-2</div>

        <div class="box display-inline">box-3</div>

        <div class="box display-inline">box-4</div>

        <div class="box display-inline">box-5</div>

      </div>

      <br>
      <br>
      <br>
      <br>

      <h1 class="heading">Display Inline-Block</h1>

      <div class="box-inline-block">
        <div class="box display-inline-block">box-1</div>

        <div class="box display-inline-block">box-2</div>

        <div class="box display-inline-block">box-3</div>

        <div class="box display-inline-block">box-4</div>

        <div class="box display-inline-block">box-5</div>
      </div>

      <br>
      
        <h1 class="heading">Display Block</h1>

        <div class="box-block">
        <div class="box display-block">box-1</div>

        <div class="box display-block">box-2</div>

        <div class="box display-block">box-3</div>

        <div class="box display-block">box-4</div>

        <div class="box display-block">box-5</div>
      </div>



        <br>
        <br>

        <h1 class="heading">Display contents </h1>

        <div class="box-contents">
        <div class="box display-contents">box-1</div>

        <div class="box display-contents">box-2</div>

        <div class="box display-contents">box-3</div>

        <div class="box display-contents">box-4</div>

        <div class="box display-contents">box-5</div>
      </div>


        <br>
        <br>

        <h1 class="heading">Display run-in </h1>

        <div class="box-run-in">
        <div class="box display-run-in">box-1</div>

        <div class="box display-run-in">box-2</div>

        <div class="box display-run-in">box-3</div>

        <div class="box display-run-in">box-4</div>

        <div class="box display-run-in">box-5</div>
      </div>

     <br>
     <br>
     <br>
     <br>

      <h1 class="heading">Display None </h1>

        <div class="box-inline">
        <div class="box display-none">box-1</div>

        <div class="box display-none">box-2</div>

        <div class="box display-none">box-3</div>

        <div class="box display-none">box-4</div>

        <div class="box display-none">box-5</div>
      </div>


      <br>
      <br>


    </div>

    
  </body>
</html>
